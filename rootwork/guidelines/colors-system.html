<!-- @dsCard group="Colors" viewport="700x170" subtitle="Semantic system colors + grade / tier mapping" name="System & Grades" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--bg-secondary);font-family:var(--font-mono)}
  .sys{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .pill{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:99px;background:rgba(255,255,255,.03);border:var(--border-default);font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary)}
  .dot{width:11px;height:11px;border-radius:50%}
  .grades{display:flex;gap:10px}
  .gr{width:46px;height:46px;border-radius:var(--radius-md);display:grid;place-items:center;font-family:var(--font-game);font-weight:900;font-size:1.3rem;border:1px solid rgba(255,255,255,.08)}
</style></head><body>
  <div class="sys">
    <span class="pill"><span class="dot" style="background:var(--success)"></span>success</span>
    <span class="pill"><span class="dot" style="background:var(--warning)"></span>warning</span>
    <span class="pill"><span class="dot" style="background:var(--danger)"></span>danger</span>
    <span class="pill"><span class="dot" style="background:var(--info)"></span>info</span>
    <span class="pill"><span class="dot" style="background:var(--gold)"></span>gold</span>
    <span class="pill"><span class="dot" style="background:var(--focus-ring)"></span>focus</span>
  </div>
  <div class="grades">
    <div class="gr" style="background:var(--gradient-fire);color:#0a0814">S</div>
    <div class="gr" style="color:var(--grade-a)">A</div>
    <div class="gr" style="color:var(--grade-b)">B</div>
    <div class="gr" style="color:var(--grade-c)">C</div>
    <div class="gr" style="color:var(--grade-d)">D</div>
  </div>
</body></html>

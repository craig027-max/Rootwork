<!-- @dsCard group="Colors" viewport="700x150" subtitle="Signature gradients: hero, fire, gold, premium" name="Brand Gradients" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--bg-primary);font-family:var(--font-mono)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .g{height:96px;border-radius:var(--radius-md);border:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;justify-content:flex-end;padding:11px}
  .g .n{font-family:var(--font-game);font-weight:700;font-size:.8rem;color:#0a0814}
  .g .t{font-size:.56rem;letter-spacing:.06em;color:rgba(10,8,20,.7)}
</style></head><body>
  <div class="row">
    <div class="g" style="background:var(--gradient-hero)"><div class="n">Hero</div><div class="t">jade · cyan · cobalt</div></div>
    <div class="g" style="background:var(--gradient-fire)"><div class="n">Fire</div><div class="t">Perfect · Grade S</div></div>
    <div class="g" style="background:var(--gradient-gold)"><div class="n">Gold</div><div class="t">stars · premium</div></div>
    <div class="g" style="background:var(--gradient-premium)"><div class="n">Premium</div><div class="t">unlock</div></div>
  </div>
</body></html>

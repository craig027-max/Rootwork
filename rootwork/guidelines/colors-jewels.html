<!-- @dsCard group="Colors" viewport="700x320" subtitle="8 curated gradient identities — one per learnable item, for life" name="The Jewel Collection" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-primary);font-family:var(--font-mono)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .j{border-radius:var(--radius-lg);padding:14px;border:1px solid rgba(255,255,255,.07);position:relative;overflow:hidden;min-height:104px;display:flex;flex-direction:column;justify-content:space-between}
  .j .bloom{position:absolute;inset:0;opacity:.9}
  .j .label{position:relative;font-family:var(--font-game);font-weight:800;font-size:1.1rem;letter-spacing:.01em;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .j .hex{position:relative;font-size:.6rem;letter-spacing:.06em;color:var(--text-muted)}
  .bar{position:relative;height:8px;border-radius:99px;margin-top:2px}
</style></head><body>
  <div class="grid" id="g"></div>
  <script>
    const J=[["Jade","jade"],["Cyan","cyan"],["Cobalt","cobalt"],["Violet","violet"],["Magenta","magenta"],["Coral","coral"],["Amber","amber"],["Lime","lime"]];
    const cs=getComputedStyle(document.documentElement);
    document.getElementById('g').innerHTML=J.map(([n,k])=>{
      const grad=cs.getPropertyValue('--jewel-'+k+'-grad').trim();
      const spark=cs.getPropertyValue('--jewel-'+k).trim();
      return `<div class="j" style="--g:${grad}">
        <div class="bloom" style="background:radial-gradient(ellipse 90% 80% at 20% 0%, rgba(255,255,255,.06), transparent 60%), ${grad};opacity:.14"></div>
        <div class="label" style="background:${grad}">${n}</div>
        <div>
          <div class="bar" style="background:${grad}"></div>
          <div class="hex">${spark}</div>
        </div>
      </div>`;
    }).join('');
  </script>
</body></html>

<!-- @dsCard group="Colors" viewport="700x150" subtitle="Inky violet-black canvas + nested surfaces" name="Canvas & Surfaces" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--bg-secondary);font-family:var(--font-mono)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:var(--radius-md);border:var(--border-default);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;overflow:hidden}
  .sw .n{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary)}
  .sw .h{font-size:.66rem;color:var(--text-muted)}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--bg-primary)"><div class="n">primary</div><div class="h">#08070f</div></div>
    <div class="sw" style="background:var(--bg-secondary)"><div class="n">secondary</div><div class="h">#0e0c1a</div></div>
    <div class="sw" style="background:var(--bg-card)"><div class="n">card</div><div class="h">#120f24</div></div>
    <div class="sw" style="background:var(--bg-tertiary)"><div class="n">tertiary</div><div class="h">#161330</div></div>
    <div class="sw" style="background:var(--bg-elevated)"><div class="n">elevated</div><div class="h">#1b1740</div></div>
  </div>
</body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-primary);display:flex;flex-direction:column;gap:16px;--spark:var(--jewel-cyan);--spark-rgb:var(--jewel-cyan-rgb);--grad:var(--jewel-cyan-grad)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

  <div class="row">

    <span class="badge badge-solid">New</span>

  </div>
  <div class="row">
    <span class="chip on">Tier 1</span>
    <span class="chip">Tier 2</span>
    <span class="chip">Tier 3</span>
    <span class="chip">Mixed</span>
  </div>

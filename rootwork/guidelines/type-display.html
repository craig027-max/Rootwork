<!-- @dsCard group="Type" viewport="700x230" subtitle="Orbitron 900 — the big root word, filled with its jewel gradient" name="Display / The Root Word" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--bg-primary);--spark:var(--jewel-violet);--spark-rgb:var(--jewel-violet-rgb);--grad:var(--jewel-violet-grad)}
  .eyebrow{margin-bottom:6px}
  .word{font-family:var(--font-game);font-weight:900;font-size:clamp(3.4rem,9vw,5.6rem);line-height:.9;letter-spacing:-.03em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 26px rgba(var(--spark-rgb),.32))}
  .meta{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.04em;color:var(--text-secondary);margin-top:10px}
  .meta b{color:var(--spark)}
</style></head><body>
  <span class="eyebrow"><span class="dot"></span> Greek Root</span>
  <div class="word">Chron</div>
  <div class="meta">Orbitron 900 · <b>--fs-display</b> · letter-spacing −0.03em · jewel-gradient fill</div>
</body></html>

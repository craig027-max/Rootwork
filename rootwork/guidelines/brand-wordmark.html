<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;background:var(--bg-primary)}
  .wrap{min-height:150px;display:flex;align-items:center;justify-content:center;gap:14px}
  .tile{width:46px;height:46px;border-radius:var(--radius-md);background:var(--gradient-hero);display:grid;place-items:center;font-size:1.45rem;box-shadow:0 0 26px rgba(52,217,240,.4)}
  .mark{font-family:var(--font-game);font-weight:800;font-size:2rem;letter-spacing:.01em;color:var(--text-primary)}
  .mark b{background:var(--gradient-hero);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
</style></head><body>
  <div class="wrap">
    <div class="tile">🌱</div>
    <div class="mark">Root<b>work</b></div>
  </div>
</body></html>

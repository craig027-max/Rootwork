<!-- @dsCard group="Spacing" viewport="700x150" subtitle="7 · 11 · 16 · 24 px + 100px pill" name="Radii" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-primary);font-family:var(--font-mono);display:flex;gap:16px;align-items:flex-end}
  .s{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:74px;height:74px;background:linear-gradient(180deg,rgba(52,224,166,.14),var(--bg-card));border:1px solid rgba(52,224,166,.3)}
  .pill{width:110px;height:46px;border-radius:100px}
  .n{font-size:.6rem;color:var(--text-muted)}
</style></head><body>
  <div class="s"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm · 7</div></div>
  <div class="s"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md · 11</div></div>
  <div class="s"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg · 16</div></div>
  <div class="s"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl · 24</div></div>
  <div class="s"><div class="box pill"></div><div class="n">pill · 100</div></div>
</body></html>

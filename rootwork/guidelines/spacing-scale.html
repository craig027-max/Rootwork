<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4 · 8 · 12 · 16 · 24 · 32 · 48 · 72 · 100" name="Spacing Scale" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-secondary);font-family:var(--font-mono)}
  .row{display:flex;align-items:flex-end;gap:14px}
  .s{display:flex;flex-direction:column;align-items:center;gap:6px}
  .b{background:var(--gradient-hero);border-radius:4px;width:18px}
  .n{font-size:.58rem;color:var(--text-muted)}
</style></head><body>
  <div class="row" id="r"></div>
  <script>
    const S=[4,8,12,16,24,32,48,72,100];
    document.getElementById('r').innerHTML=S.map((v,i)=>`<div class="s"><div class="b" style="height:${v}px"></div><div class="n">${v}</div></div>`).join('');
  </script>
</body></html>

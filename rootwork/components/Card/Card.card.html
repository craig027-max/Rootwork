<!-- @dsCard group="Components" viewport="700x300" name="Card" subtitle="Jewel-lit surface — set the jewel once, everything inherits" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-secondary);display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .card{padding:22px}
  .eyebrow{margin-bottom:8px}
  .word{font-family:var(--font-game);font-weight:900;font-size:2.6rem;line-height:.92;letter-spacing:-.03em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 22px rgba(var(--spark-rgb),.32))}
  .mean{font-family:var(--font-game);font-weight:800;font-size:1.2rem;color:var(--spark);margin-top:6px}
  .lead{margin:12px 0 16px;font-size:.95rem}
</style></head><body>
  <article class="card card-interactive" style="--spark:var(--jewel-violet);--spark-rgb:var(--jewel-violet-rgb);--grad:var(--jewel-violet-grad)">
    <span class="eyebrow"><span class="dot"></span> Greek Root</span>
    <div class="word">Chron</div>
    <div class="mean">→ time</div>
    <p class="lead">See <b>chron</b> and think <b>time</b> — order, clocks, and how long things last.</p>
    <span class="badge">Tier 4 · Master</span>
  </article>
  <article class="card card-interactive" style="--spark:var(--jewel-coral);--spark-rgb:var(--jewel-coral-rgb);--grad:var(--jewel-coral-grad)">
    <span class="eyebrow"><span class="dot"></span> Latin Root</span>
    <div class="word">Flect</div>
    <div class="mean">→ bend</div>
    <p class="lead">See <b>flect</b> and think <b>bend</b> — to turn, fold, or change direction.</p>
    <span class="badge">Tier 2 · Builder</span>
  </article>
</body></html>
